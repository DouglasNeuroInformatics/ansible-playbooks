- name: Load Snipe-IT vaulted secrets
  # Loaded here (rather than in site.yml) so vault decryption is only required
  # for snipeit-tagged runs, not every routine site.yml run.
  include_vars: "{{ playbook_dir }}/vars/secrets.yml"

- name: Ensure hardware discovery tools are installed
  # packages.yml is tagged 'software' and does not run under --tags snipeit,
  # so install the tools this role needs directly.
  apt:
    name:
      - dmidecode
      - lshw
    state: present

- name: Retrieve BIOS vendor
  command: dmidecode -s bios-vendor
  register: bios_vendor
  ignore_errors: yes  # this fails because of older dmidecode versions

- name: Retrieve BIOS version
  command: dmidecode -s bios-version
  register: bios_version
  ignore_errors: yes  # this fails because of older dmidecode versions

- name: Retrieve BIOS revision
  command: dmidecode -s bios-revision
  register: bios_revision
  ignore_errors: yes  # this fails because of older dmidecode versions

- name: Set BIOS info
  set_fact:
    bios_version: "{{ bios_vendor.stdout | default('') | trim }} {{ bios_version.stdout | default('') | trim }} {{ bios_revision.stdout | default('') | trim }}"

- name: Retrieve baseboard manufacturer
  command: dmidecode -s baseboard-manufacturer
  register: baseboard_manufacturer
  ignore_errors: yes  # degrade gracefully on older dmidecode versions

- name: Retrieve baseboard product name
  command: dmidecode -s baseboard-product-name
  register: baseboard_product_name
  ignore_errors: yes  # degrade gracefully on older dmidecode versions

- name: Set motherboard info
  set_fact:
    motherboard: "{{ baseboard_manufacturer.stdout | default('') | trim }} {{ baseboard_product_name.stdout | default('') | trim }}"

- name: Retrieve baseboard serial number
  command: dmidecode -s baseboard-serial-number
  register: baseboard_serial_number
  ignore_errors: yes  # degrade gracefully on older dmidecode versions

- name: Set serial number
  set_fact:
    serial_number: "{{ baseboard_serial_number.stdout | default('') | trim }}"

- name: Retrieve cpu type
  command: dmidecode -s processor-family
  register: processor_family
  ignore_errors: yes  # degrade gracefully on older dmidecode versions

- name: Retrieve cpu manufacturer
  command: dmidecode -s processor-manufacturer
  register: processor_manufacturer
  ignore_errors: yes  # degrade gracefully on older dmidecode versions

- name: Retrieve cpu version
  command: dmidecode -s processor-version
  register: processor_version
  ignore_errors: yes  # degrade gracefully on older dmidecode versions

- name: Set cpu info
  set_fact:
    cpu: "{{ processor_family.stdout | default('') | trim }} {{ processor_manufacturer.stdout | default('') | trim }} {{ processor_version.stdout | default('') | trim }}"

- name: Retrieve gpu
  command: lshw -C display
  register: gpu_info
  ignore_errors: yes  # degrade gracefully if lshw is unavailable or fails

- name: Parse gpu model
  set_fact:
    gpu_model: "{{ gpu_info.stdout | default('') | regex_search('product: (.+)', '\\1') | default('Unknown') | replace('[', '') | replace(']', '') | replace('\"', '') | replace(\"'\", '') }}"

- name: Retrieve storage devices
  # Dedupe by disk serial so multipath SAS enclosures (each physical disk is
  # visible via several I/O paths) are counted once, not dozens of times.
  # Genuinely identical disks have distinct serials, so they are preserved and
  # collapsed to "MODEL SIZE (bus) xN".
  shell: |
    set -o pipefail
    lsblk -dn -P -o NAME,MODEL,SERIAL,SIZE,TRAN,ROTA,TYPE | awk '
      {
        delete f
        while (match($0, /[A-Z]+="[^"]*"/)) {
          kv = substr($0, RSTART, RLENGTH); eq = index(kv, "=")
          f[substr(kv, 1, eq-1)] = substr(kv, eq+2, length(kv)-eq-2)
          $0 = substr($0, RSTART+RLENGTH)
        }
        if (f["TYPE"] != "disk") next
        if (f["NAME"] ~ /^(loop|sr|ram|zram)/) next           # skip non-disk block devices
        id = (f["SERIAL"] != "" ? f["SERIAL"] : f["NAME"])
        if (seen[id]++) next                                  # collapse multipath duplicates
        label = f["MODEL"]; gsub(/[ \t]+$/, "", label)
        if (label == "") label = f["NAME"]
        label = label " " f["SIZE"]
        if (f["TRAN"] != "") label = label " (" f["TRAN"] ")"
        if (!(label in cnt)) order[++n] = label
        cnt[label]++
      }
      END {
        for (i = 1; i <= n; i++) {
          l = order[i]
          printf "%s%s%s", (i > 1 ? "; " : ""), l, (cnt[l] > 1 ? " x" cnt[l] : "")
        }
      }'
  args:
    executable: /bin/bash
  register: storage_info
  changed_when: false
  ignore_errors: yes  # degrade gracefully if lsblk is unavailable

- name: Set storage info
  set_fact:
    storage: "{{ storage_info.stdout | default('') | trim }}"

- name: Retrieve memory DIMM layout
  # Emit populated DIMMs grouped as "N x SIZE"; drop empty slots and the sub-GB
  # reserved regions dmidecode reports (e.g. a spurious "4 MB" module).
  shell: |
    set -o pipefail
    dmidecode -t memory | awk '
      /^\s*Size:/ {
        if ($2 ~ /^[0-9]+$/) {
          if ($3 == "MB" && $2 + 0 < 1024) next               # skip sub-GB filler entries
          size = $2 " " $3
          if (!(size in cnt)) order[++n] = size
          cnt[size]++
        }
      }
      END {
        for (i = 1; i <= n; i++) printf "%s%s x %s", (i > 1 ? ", " : ""), cnt[order[i]], order[i]
      }'
  args:
    executable: /bin/bash
  register: memory_info
  changed_when: false
  ignore_errors: yes  # degrade gracefully on older dmidecode versions

- name: Set memory info
  set_fact:
    memory_slots: "{{ memory_info.stdout | default('') | trim }}"

- name: Define Snipe-IT API headers
  no_log: true  # keep the Bearer token out of the log
  set_fact:
    snipeit_headers:
      Authorization: "Bearer {{ snipeit_api_token }}"
      Accept: "application/json"
      Content-Type: "application/json"

- name: Assemble Snipe-IT asset payload
  # Hardware-derived fields only. Human-managed fields (location, owner, primary
  # user, purchase date) are deliberately omitted: this payload is PATCHed on
  # every rerun, so sending them would clobber values edited in the Snipe-IT UI.
  set_fact:
    snipeit_body:
      name: "{{ ansible_hostname }}"
      model_id: "{{ snipeit_model_id }}"
      status_id: 4  # Online status
      serial: "{{ serial_number }}"
      _snipeit_bios_15: "{{ bios_version }}"
      _snipeit_motherboard_16: "{{ motherboard }}"
      _snipeit_os_8: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
      _snipeit_ram_10: "{{ ansible_memtotal_mb }} MB"
      _snipeit_cpu_11: "{{ cpu }}"
      _snipeit_gpu_9: "{{ gpu_model }}"
      _snipeit_storage_17: "{{ storage }}"
      _snipeit_memory_slots_18: "{{ memory_slots }}"
      _snipeit_ip_address_12: "{{ ansible_all_ipv4_addresses | join(', ') }}"
      _snipeit_mac_address_1: "{{ ansible_default_ipv4.macaddress }}"
      _snipeit_service_status_13: "in service"

- name: Look up existing Snipe-IT asset by name
  # Match on name (== hostname), NOT asset_tag: tags in this instance are
  # inconsistent (mostly serials, some hostnames, some MACs), so keying on
  # asset_tag would fail to find most assets and create duplicates on rerun.
  # Snipe-IT has no by-name endpoint, so search then filter to an exact match.
  no_log: true
  uri:
    url: "{{ snipeit_url }}/api/v1/hardware?search={{ ansible_hostname | urlencode }}&limit=100"
    headers: "{{ snipeit_headers }}"
    timeout: 30
  delegate_to: localhost
  become: false  # HTTP call on the control node needs no privilege escalation
  register: snipeit_lookup

- name: Select exact-name match (search is fuzzy, so filter precisely)
  set_fact:
    snipeit_matches: "{{ snipeit_lookup.json.rows | default([]) | selectattr('name', 'equalto', ansible_hostname) | list }}"

- name: Refuse to guess when a hostname maps to multiple assets
  assert:
    that: snipeit_matches | length <= 1
    fail_msg: "Multiple Snipe-IT assets named {{ ansible_hostname }} (ids {{ snipeit_matches | map(attribute='id') | list }}); resolve the duplicate before running."

- name: Update existing asset in Snipe-IT
  # PATCH reconciles the record on every run: backfills new fields and refreshes
  # changed hardware. Only the fields in snipeit_body are touched.
  when: snipeit_matches | length == 1
  no_log: true
  uri:
    url: "{{ snipeit_url }}/api/v1/hardware/{{ (snipeit_matches | first).id }}"
    method: PATCH
    headers: "{{ snipeit_headers }}"
    body_format: json
    body: "{{ snipeit_body }}"
    status_code: 200
    timeout: 30  # don't block indefinitely if Snipe-IT is unresponsive
  delegate_to: localhost
  become: false
  register: snipeit_update
  # Snipe-IT returns HTTP 200 with a status field even on validation errors.
  failed_when: (snipeit_update.json.status | default('error')) == 'error'

- name: Create asset in Snipe-IT
  # First registration only. New assets are tagged with the hostname (guaranteed
  # present and unique), which the lookup above will match on subsequent runs.
  when: snipeit_matches | length == 0
  no_log: true
  uri:
    url: "{{ snipeit_url }}/api/v1/hardware"
    method: POST
    headers: "{{ snipeit_headers }}"
    body_format: json
    body: "{{ snipeit_body | combine({'asset_tag': ansible_hostname}) }}"
    status_code: 200
    timeout: 30
  delegate_to: localhost
  become: false
  register: snipeit_create
  failed_when: (snipeit_create.json.status | default('error')) == 'error'
